services:
  - type: web
    name: mini-agent-scaffold
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: 123456
      - key: MODEL_NAME
        value: openrouter/auto
      - key: LLM_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_APP_NAME
        value: mini-agent-scaffold
      - key: LLM_API_KEY
        sync: false
      - key: PUBLIC_API_KEY
        sync: false
      - key: OPENROUTER_SITE_URL
        sync: false
