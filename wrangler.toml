name = "tide-1"
main = "src/worker.js"
compatibility_date = "2026-03-07"
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*", "/admin"]

[[kv_namespaces]]
binding = "AGENT_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[vars]
ADMIN_USERNAME = "admin"
ADMIN_PASSWORD = "123456"
LLM_BASE_URL = "https://openrouter.ai/api/v1"
MODEL_NAME = "openrouter/auto"
OPENROUTER_APP_NAME = "mini-agent-scaffold"
OPENROUTER_SITE_URL = ""
